syntax = "proto3";

package meshtastic;

option csharp_namespace = "Meshtastic.Protobufs";

message Position {
  sfixed32 latitude_i = 1;
  sfixed32 longitude_i = 2;
  int32 altitude = 3;
  fixed32 time = 4;
  uint32 ground_speed = 14;   // m/s
  uint32 ground_track = 15;   // degrees * 100000 (0=North, clockwise)
}

message User {
  string id = 1;
  string long_name = 2;
  string short_name = 3;
  bytes macaddr = 4;
  HardwareModel hw_model = 5;
  bool is_licensed = 6;
  Role role = 7;
  bytes public_key = 8;
  optional bool is_unmessagable = 9;
}

message RouteDiscovery {
  repeated fixed32 route = 1;
  repeated int32 snr_towards = 2;
  repeated fixed32 route_back = 3;
  repeated int32 snr_back = 4;
}

message Data {
  uint32 portnum = 1;
  bytes payload = 2;
  bool want_response = 3;
  fixed32 dest = 4;
  fixed32 source = 5;
  fixed32 request_id = 6;
  fixed32 reply_id = 7;
  fixed32 emoji = 8;
}

message Routing {
  oneof variant {
    RouteDiscovery route_request = 1;
    RouteDiscovery route_reply = 2;
  }
}

message MeshPacket {
  fixed32 from = 1;
  fixed32 to = 2;
  uint32 channel = 3;
  oneof payload_variant {
    Data decoded = 4;
    bytes encrypted = 5;
  }
  fixed32 id = 6;
  fixed32 rx_time = 7;
  float rx_snr = 8;
  uint32 hop_limit = 9;
  bool want_ack = 10;
  Priority priority = 11;
  int32 rx_rssi = 12;
  bool via_mqtt = 14;
  uint32 hop_start = 15;
  bytes public_key = 16;
  bool pki_encrypted = 17;
}

message NodeInfo {
  uint32 num = 1;
  User user = 2;
  Position position = 3;
  float snr = 4;
  fixed32 last_heard = 5;
  DeviceMetrics device_metrics = 6;
  uint32 channel = 7;
  bool via_mqtt = 8;
  uint32 hops_away = 9;
  bool is_favorite = 10;
}

message MyNodeInfo {
  uint32 my_node_num = 1;
  uint32 reboot_count = 8;
  uint32 min_app_version = 11;
}

message DeviceMetrics {
  uint32 battery_level = 1;
  float voltage = 2;
  float channel_utilization = 3;
  float air_util_tx = 4;
  uint32 uptime_seconds = 5;
}

message MqttClientProxyMessage {
  string topic = 1;
  oneof payload_variant {
    bytes data = 2;
    string text = 3;
  }
  bool retained = 4;
}

message FromRadio {
  uint32 id = 1;
  oneof payload_variant {
    MeshPacket packet = 2;
    MyNodeInfo my_info = 3;
    NodeInfo node_info = 4;
    Config config = 5;
    uint32 config_complete_id = 7;
    bool rebooted = 8;
    ModuleConfig module_config = 9;
    Channel channel = 10;
    MqttClientProxyMessage mqtt_client_proxy_message = 14;
  }
}

message ToRadio {
  oneof payload_variant {
    MeshPacket packet = 1;
    uint32 want_config_id = 3;
    bool disconnect = 4;
    bytes xmodem_packet = 5;
    MqttClientProxyMessage mqtt_client_proxy_message = 6;
  }
}

message Channel {
  int32 index = 1;
  ChannelSettings settings = 2;
  ChannelRole role = 3;
}

message ChannelSettings {
  uint32 channel_num = 1;
  bytes psk = 2;
  string name = 3;
  fixed32 id = 4;
  bool uplink_enabled = 5;
  bool downlink_enabled = 6;
}

message SecurityConfig {
  bytes public_key = 1;
  bytes private_key = 2;
  repeated bytes admin_key = 3;
  bool is_managed = 4;
  bool serial_enabled = 5;
  bool debug_log_api_enabled = 6;
  bool admin_channel_enabled = 8;
}

message DeviceMetadata {
  string firmware_version = 1;
  // fields 2-8 omitted (not needed client-side)
  HardwareModel hw_model = 9;
}

message Config {
  oneof payload_variant {
    DeviceConfig device = 1;
    PositionConfig position = 2;
    PowerConfig power = 3;
    NetworkConfig network = 4;
    DisplayConfig display = 5;
    LoRaConfig lora = 6;
    BluetoothConfig bluetooth = 7;
    SecurityConfig security = 8;
  }
}

enum RebroadcastMode {
  ALL = 0;
  ALL_SKIP_DECODING = 1;
  LOCAL_ONLY = 2;
  KNOWN_ONLY = 3;
  NONE = 4;
  CORE_PORTNUMS_ONLY = 5;
}

enum GpsMode {
  GPS_DISABLED = 0;
  GPS_ENABLED = 1;
  GPS_NOT_PRESENT = 2;
}

message DeviceConfig {
  Role role = 1;
  // serial_enabled = 2 deprecated
  uint32 button_gpio = 4;
  uint32 buzzer_gpio = 5;
  RebroadcastMode rebroadcast_mode = 6;
  uint32 node_info_broadcast_secs = 7;
  bool double_tap_as_button_press = 8;
  bool disable_triple_click = 10;
  string tzdef = 11;
  bool led_heartbeat_disabled = 12;
}

message PositionConfig {
  uint32 position_broadcast_secs = 1;
  bool position_broadcast_smart_enabled = 2;
  bool fixed_position = 3;
  // gps_enabled = 4 deprecated
  uint32 gps_update_interval = 5;
  // gps_attempt_time = 6 deprecated
  uint32 position_flags = 7;
  uint32 rx_gpio = 8;
  uint32 tx_gpio = 9;
  uint32 broadcast_smart_minimum_distance = 10;
  uint32 broadcast_smart_minimum_interval_secs = 11;
  uint32 gps_en_gpio = 12;
  GpsMode gps_mode = 13;
}

message PowerConfig {
  bool is_power_saving = 1;
  uint32 on_battery_shutdown_after_secs = 2;
  float adc_multiplier_override = 3;
  uint32 wait_bluetooth_secs = 4;
  // field 5 reserved/skipped in firmware
  uint32 sds_secs = 6;
  uint32 ls_secs = 7;
  uint32 min_wake_secs = 8;
  uint32 device_battery_ina_address = 9;
}

message NetworkConfig {
  bool wifi_enabled = 1;
  // field 2 reserved/skipped in firmware
  string wifi_ssid = 3;
  string wifi_psk = 4;
  string ntp_server = 5;
  bool eth_enabled = 6;
  uint32 address_mode = 7;   // 0=DHCP, 1=STATIC
  // ipv4_config = 8 (nested, skip for now)
  string rsyslog_server = 9;
}

message DisplayConfig {
  uint32 screen_on_secs = 1;
  // gps_format = 2 deprecated
  uint32 auto_screen_carousel_secs = 3;
  bool compass_north_top = 4;           // deprecated in 2.7.4
  bool flip_screen = 5;
  uint32 units = 6;                     // 0=METRIC, 1=IMPERIAL
  uint32 oled = 7;                      // 0=AUTO, 1=SSD1306, 2=SH1106, 3=SH1107
  uint32 displaymode = 8;              // 0=DEFAULT, 1=TWOCOLOR, 2=INVERTED, 3=COLOR
  bool heading_bold = 9;
  bool wake_on_tap_or_motion = 10;
  uint32 compass_orientation = 11;     // 0=0°, 1=90°, 2=180°, 3=270°
  bool use_12h_clock = 12;
}

message LoRaConfig {
  bool use_preset = 1;
  ModemPreset modem_preset = 2;
  uint32 bandwidth = 3;
  uint32 spread_factor = 4;
  uint32 coding_rate = 5;
  float frequency_offset = 6;
  Region region = 7;
  uint32 hop_limit = 8;
  bool tx_enabled = 9;
  int32 tx_power = 10;
  uint32 channel_num = 11;
  bool override_duty_cycle = 12;
  bool sx126x_rx_boosted_gain = 13;
  float override_frequency = 14;
  bool ignore_mqtt = 104;
  bool config_ok_to_mqtt = 105;
}

message BluetoothConfig {
  bool enabled = 1;
  uint32 mode = 2;
  uint32 fixed_pin = 3;
}

message ModuleConfig {
  oneof payload_variant {
    MQTTConfig mqtt = 1;
    SerialConfig serial = 2;
    ExternalNotificationConfig external_notification = 3;
    StoreForwardConfig store_forward = 4;
    RangeTestConfig range_test = 5;
    TelemetryConfig telemetry = 6;
    CannedMessageConfig canned_message = 7;
    AudioConfig audio = 8;
    RemoteHardwareConfig remote_hardware = 9;
    NeighborInfoConfig neighbor_info = 10;
  }
}

message MQTTConfig {
  bool enabled = 1;
  string address = 2;
  string username = 3;
  string password = 4;
  bool encryption_enabled = 5;
  bool json_enabled = 6;
  bool tls_enabled = 7;
  string root = 8;
  bool proxy_to_client_enabled = 9;
  bool map_reporting_enabled = 10;
}

message SerialConfig {
  bool enabled = 1;
  bool echo = 2;
  uint32 rxd = 3;
  uint32 txd = 4;
  uint32 baud = 5;
  uint32 timeout = 6;
  uint32 mode = 7;
}

message ExternalNotificationConfig {
  bool enabled = 1;
  uint32 output_ms = 2;
  uint32 output = 3;
  bool active = 4;
  bool alert_message = 5;
  bool alert_bell = 6;
}

message StoreForwardConfig {
  bool enabled = 1;
  bool heartbeat = 2;
  uint32 records = 3;
  uint32 history_return_max = 4;
  uint32 history_return_window = 5;
}

message RangeTestConfig {
  bool enabled = 1;
  uint32 sender = 2;
  bool save = 3;
}

message TelemetryConfig {
  uint32 device_update_interval = 1;
  uint32 environment_update_interval = 2;
  bool environment_display_fahrenheit = 3;
  bool environment_measurement_enabled = 4;
  uint32 air_quality_interval = 5;
  uint32 power_update_interval = 6;
  bool power_measurement_enabled = 7;
}

message CannedMessageConfig {
  bool rotary1_enabled = 1;
  uint32 inputbroker_pin_press = 2;
  uint32 inputbroker_event_cw = 3;
  uint32 inputbroker_event_ccw = 4;
  uint32 inputbroker_event_press = 5;
  bool updown1_enabled = 6;
  bool enabled = 7;
  string allow_input_source = 8;
  bool send_bell = 9;
}

message AudioConfig {
  bool codec2_enabled = 1;
  uint32 ptt_pin = 2;
  bool bitrate = 3;
  uint32 i2s_ws = 4;
  uint32 i2s_sd = 5;
  uint32 i2s_din = 6;
  uint32 i2s_sck = 7;
}

message RemoteHardwareConfig {
  bool enabled = 1;
  bool allow_undefined_pin_access = 2;
  repeated RemoteHardwarePin available_pins = 3;
}

message RemoteHardwarePin {
  uint32 gpio_pin = 1;
  string name = 2;
  uint32 type = 3;
}

message NeighborInfoConfig {
  bool enabled = 1;
  uint32 update_interval = 2;
}

