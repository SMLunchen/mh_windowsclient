enum Role {
  CLIENT = 0;
  CLIENT_MUTE = 1;
  ROUTER = 2;
  ROUTER_CLIENT = 3;
  REPEATER = 4;
  TRACKER = 5;
  SENSOR = 6;
  TAK = 7;
  CLIENT_HIDDEN = 8;
  LOST_AND_FOUND = 9;
  TAK_TRACKER = 10;
  ROUTER_LATE = 11;
  CLIENT_BASE = 12;
}

enum ChannelRole {
  DISABLED = 0;
  PRIMARY = 1;
  SECONDARY = 2;
}

enum Priority {
  UNSET_PRIORITY = 0;
  MIN = 1;
  BACKGROUND = 10;
  DEFAULT = 64;
  RELIABLE = 70;
  ACK = 120;
  MAX = 127;
}

