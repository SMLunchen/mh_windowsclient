  UNSET_REGION = 0;
  US = 1;
  EU_868 = 3;
  CN = 4;
  JP = 5;
  ANZ = 6;
  KR = 7;
  TW = 8;
  RU = 9;
  IN = 10;
  NZ_865 = 11;
  TH = 12;
  UA_868 = 13;
  MY_919 = 14;
  SG_923 = 15;
  LORA_24 = 16;
}

enum ModemPreset {
  LONG_FAST = 0;
  LONG_SLOW = 1;
  VERY_LONG_SLOW = 2;
  MEDIUM_SLOW = 3;
  MEDIUM_FAST = 4;
  SHORT_SLOW = 5;
  SHORT_FAST = 6;
  LONG_MODERATE = 7;
}

enum GpsCoordinateFormat {
  DEC = 0;
  DMS = 1;
  UTM = 2;
  MGRS = 3;
  OLC = 4;
  OSGR = 5;
}

/// Waypoint message (PortNum = WAYPOINT_APP = 8) – field numbers match official Meshtastic protobufs
message Waypoint {
  uint32            id           = 1;  // Unique waypoint ID
  optional sfixed32 latitude_i  = 2;  // Latitude * 1e7
  optional sfixed32 longitude_i = 3;  // Longitude * 1e7
  uint32            expire       = 4;  // Unix timestamp when expires (0 = never)
  uint32            locked_to    = 5;  // NodeId that can edit (0 = anyone)
  string            name         = 6;  // Short name (max 30 chars)
  string            description  = 7;  // Description (max 100 chars)
  fixed32           icon         = 8;  // Unicode codepoint (0 = default)
}
